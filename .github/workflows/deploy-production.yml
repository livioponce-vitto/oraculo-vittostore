name: Deploy Oraculo Backend to Production

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vittostore-oraculo

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy via Render Hook
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_ORACULO }}"

      - name: Poll health check
        run: |
          MAX=18
          INTERVAL=15
          URL="${{ secrets.ORACULO_URL }}/health"
          for i in $(seq 1 $MAX); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Attempt $i/$MAX — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep $INTERVAL
          done
          echo "::error::Health check timed out after $((MAX * INTERVAL))s"
          echo "## ❌ Deploy Health Check Timed Out" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | \`$URL\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          exit 1

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && vars.SLACK_WEBHOOK_URL != '' || always() && secrets.SLACK_WEBHOOK_URL != ''
    steps:
      - name: Notify Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        with:
          payload: |
            {
              "text": "${{ needs.deploy.result == 'success' && '✅' || '❌' }} *Oraculo Backend Deploy ${{ needs.deploy.result == 'success' && 'Succeeded' || 'Failed' }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.deploy.result == 'success' && '✅' || '❌' }} *Oraculo Backend Deploy — ${{ needs.deploy.result == 'success' && 'Success' || 'Failure' }}*\n*Commit:* `${{ github.sha }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
